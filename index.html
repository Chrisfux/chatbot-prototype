<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob Chatbot Marktplatz Prototyp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-image: url('1775235910172_Bildschirmfoto_2026-04-03_um_19_00_11.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh; 
            position: relative;
        }
        .chat-launcher {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #951D40 0%, #B8324F 70%, #D63353 100%);
            border-radius: 50%;
            box-shadow: 0 12px 40px rgba(149, 29, 64, 0.4);
            border: 4px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .chat-launcher:hover {
            transform: scale(1.08) rotate(5deg);
            box-shadow: 0 16px 50px rgba(149, 29, 64, 0.5);
        }
        .chat-launcher:active { transform: scale(0.98); }
        .chat-icon-launch { width: 28px; height: 28px; fill: white; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
        .badge {
            position: absolute; top: -4px; right: -4px;
            width: 20px; height: 20px;
            background: #106299;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: white;
            box-shadow: 0 2px 8px rgba(16, 98, 153, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .chat-container {
            position: fixed;
            bottom: 120px; right: 30px;
            width: 400px; max-width: 90vw; max-height: 70vh;
            background: white; border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(149, 29, 64, 0.25);
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(100%) scale(0.9);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
        }
        .chat-container.open {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .chat-header {
            background: linear-gradient(135deg, #951D40 0%, #B8324F 70%, #D63353 100%);
            color: white;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .chat-header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .chat-icon-header {
            width: 26px; height: 26px; fill: white; flex-shrink: 0;
        }
        .chat-header h1 { font-size: 24px; margin: 0; }
        .chat-header p { opacity: 0.9; font-size: 14px; margin: 6px 0 0 0; }
        .minimize-btn {
            position: absolute;
            top: 16px; right: 16px;
            background: none; border: none; color: rgba(255,255,255,0.7);
            font-size: 20px; cursor: pointer; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; transition: all 0.2s;
        }
        .minimize-btn:hover { color: white; background: rgba(255,255,255,0.1); }

        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc;
        }
        .chips-container { margin: 24px 0; }
        .message { margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .message.bot { justify-content: flex-start; }
        .message.user { justify-content: flex-end; }
        .message-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px;
            flex-shrink: 0;
        }
        .bot-avatar { background: linear-gradient(135deg, #951D40 0%, #B8324F 100%); color: white; }
        .user-avatar { background: linear-gradient(135deg, #106299 0%, #1E80B3 100%); color: white; }
        .message-bubble {
            max-width: 70%; padding: 14px 18px; border-radius: 20px; line-height: 1.5; font-size: 15px;
        }
        .bot-bubble { 
            background: #FDF2F4; color: #5B1A32;
            box-shadow: 0 2px 10px rgba(149, 29, 64, 0.1); 
            border-left: 4px solid #951D40;
        }
        .user-bubble { background: linear-gradient(135deg, #106299 0%, #1E80B3 100%); color: white; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .chip {
            background: #e2e8f0; padding: 8px 16px; border-radius: 20px;
            font-size: 14px; cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent; color: #374151;
        }
        .chip:hover { background: #cbd5e1; transform: translateY(-1px); }
        .chip:active { border-color: #106299; }
        .chat-input { padding: 20px; background: white; border-top: 1px solid rgba(16, 98, 153, 0.1); }
        .input-group { display: flex; gap: 12px; align-items: stretch; }
        .input-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            border: 2px solid rgba(16, 98, 153, 0.2);
            border-radius: 25px;
            padding: 0 10px 0 16px;
            transition: all 0.2s;
            background: white;
            position: relative;
        }
        .input-wrap:focus-within {
            border-color: #106299;
            box-shadow: 0 0 0 3px rgba(16, 98, 153, 0.1);
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 50px 14px 7px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            background: transparent;
            min-width: 0;
        }
        .mic-btn {
            width: 38px; height: 38px;
            border: none;
            border-radius: 50%;
            background: #eaf3fb;
            color: #106299;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }
        .mic-btn:hover {
            background: #dcecf8;
            transform: translateY(-50%) scale(1.05);
        }
        .mic-btn.listening {
            background: #106299;
            color: white;
            box-shadow: 0 0 0 4px rgba(16, 98, 153, 0.15);
            animation: micPulse 1.2s infinite;
        }
        @keyframes micPulse {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.08); }
        }
        .send-btn {
            width: 50px; min-width: 50px; height: 100%; border: none; border-radius: 50%;
            background: linear-gradient(135deg, #106299 0%, #1E80B3 100%);
            color: white; cursor: pointer; font-size: 18px; transition: all 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:active { transform: scale(0.98); }
        .link { 
            color: #106299; text-decoration: none; font-weight: 500;
            border-bottom: 1px solid rgba(16, 98, 153, 0.3);
            transition: all 0.2s;
        }
        .link:hover { border-bottom-color: #106299; }
        .mic-status {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
            min-height: 16px;
        }
        .mic-status.active { color: #106299; font-weight: 500; }

        /* Mobile Optimierungen */
        @media (max-width: 600px) {
            .chat-container {
                left: 10px;
                right: 10px;
                bottom: 10px;
                width: auto;
                max-width: calc(100vw - 20px);
                max-height: 85vh;
            }
            .chat-input {
                padding: 16px 12px 16px;
            }
            .input-group {
                gap: 8px;
                width: 100%;
                min-width: 0;
            }
            .input-wrap {
                padding-right: 10px;
            }
            .send-btn {
                width: 56px;
                height: 56px;
                font-size: 20px;
                min-width: 56px;
            }
            .mic-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-launcher" id="launcher" onclick="toggleChat()">
        <svg class="chat-icon-launch" viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2l8 0v4l4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"></path>
        </svg>
        <div class="badge" id="badge" style="display: none;">1</div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <div class="chat-header-top">
                <svg class="chat-icon-header" viewBox="0 0 24 24">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2l8 0v4l4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"></path>
                </svg>
                <h1>Bob</h1>
            </div>
            <p>Dein digitaler Assistent für die IT-Sicherheit.</p>
            <button class="minimize-btn" onclick="toggleChat()" title="Minimieren">−</button>
        </div>

        <div class="chat-messages" id="messages">
            <div class="message bot">
                <div class="message-avatar bot-avatar">B</div>
                <div class="message-bubble bot-bubble">
                    Hallo! Ich bin <strong>Bob</strong>, und beantworte Fragen zum Thema IT-Sicherheit.
                    <br><br>
                    Was möchtest du wissen?
                </div>
            </div>
        </div>

        <div class="chat-input">
            <div class="input-group">
                <div class="input-wrap">
                    <input type="text" id="userInput" placeholder="Deine Frage zu IT-Sicherheit..." autocomplete="off" enterkeyhint="send">
                    <button class="mic-btn" id="micBtn" onclick="toggleSpeechInput()" title="Mit Sprache eingeben" aria-label="Mit Sprache eingeben">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                </div>
                <button class="send-btn" onclick="sendMessage()">→</button>
            </div>
            <div class="mic-status" id="micStatus"></div>
        </div>
    </div>

    <script>
        const chipSuggestions = [
            "Aktuelle Cyber-Angriffe",
            "Schutztools empfehlen",
            "Anbieter in meiner Region",
            "Ransomware Tipps",
            "IT-Sicherheitsnews"
        ];

        let chatOpen = false;
        let recognition = null;
        let isListening = false;

        function toggleChat() {
            const container = document.getElementById('chatContainer');
            const launcher = document.getElementById('launcher');
            chatOpen = !chatOpen;
            if (chatOpen) {
                container.classList.add('open');
                launcher.style.opacity = '0.5';
                document.getElementById('badge').style.display = 'none';
                addGreetingChips();
            } else {
                container.classList.remove('open');
                launcher.style.opacity = '1';
                stopSpeechInput();
            }
        }

        function addGreetingChips() {
            const messages = document.getElementById('messages');
            if (messages.querySelector('.chips')) return;
            const chipsContainer = document.createElement('div');
            chipsContainer.className = 'chips-container';
            const chipsDiv = document.createElement('div');
            chipsDiv.className = 'chips';
            chipsDiv.id = 'greetingChips';
            chipSuggestions.forEach(text => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.textContent = text;
                chip.onclick = (e) => {
                    e.stopPropagation();
                    chipsContainer.remove();
                    document.getElementById('userInput').value = text;
                    sendMessage();
                };
                chipsDiv.appendChild(chip);
            });
            chipsContainer.appendChild(chipsDiv);
            messages.appendChild(chipsContainer);
            messages.scrollTop = messages.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            if (chipSuggestions.includes(text)) {
                setTimeout(() => {
                    const chipResponses = {
                        "Aktuelle Cyber-Angriffe": `Hier sind aktuelle Infos zu Cyber-Angriffen:<br><br><strong>📰 News:</strong> "Phishing-Welle erreicht Rekordhoch" (15.03.2026)<br><a href="https://marktplatz-it-sicherheit.de/news/phishing-rekord-2026" target="_blank" class="link">→ News lesen</a><br><br><strong>📄 Artikel:</strong> "Top 5 Angriffe der Woche"<br><a href="https://marktplatz-it-sicherheit.de/artikel/top-angriffe-2026" target="_blank" class="link">→ Artikel lesen</a>`,
                        "Schutztools empfehlen": `Gute Schutztools für Unternehmen:<br><br><strong>📰 News:</strong> "Neue SIEM-Tools im Test" (02.04.2026)<br><a href="https://marktplatz-it-sicherheit.de/news/siem-test-2026" target="_blank" class="link">→ News lesen</a><br><br><strong>📄 Artikel:</strong> "Die besten 10 Tools 2026"<br><a href="https://marktplatz-it-sicherheit.de/artikel/best-tools-2026" target="_blank" class="link">→ Artikel lesen</a>`,
                        "Anbieter in meiner Region": `Anbieter-Suche für deine Region:<br><br><strong>📰 News:</strong> "Neue if(is) Partner in NRW" (01.04.2026)<br><a href="https://marktplatz-it-sicherheit.de/news/partner-nrw-2026" target="_blank" class="link">→ News lesen</a><br><br><strong>📄 Artikel:</strong> "Lokale Sicherheitsanbieter"<br><a href="https://marktplatz-it-sicherheit.de/artikel/lokale-anbieter" target="_blank" class="link">→ Artikel lesen</a>`,
                        "Ransomware Tipps": `Tipps gegen Ransomware:<br><br><strong>📰 News:</strong> "Neuer LockBit-Angriff" (03.04.2026)<br><a href="https://marktplatz-it-sicherheit.de/news/lockbit-2026" target="_blank" class="link">→ News lesen</a><br><br><strong>📄 Artikel:</strong> "Ransomware-Abwehrstrategie"<br><a href="https://marktplatz-it-sicherheit.de/artikel/ransomware-strategie" target="_blank" class="link">→ Artikel lesen</a>`,
                        "IT-Sicherheitsnews": `Neueste IT-Sicherheitsnews:<br><br><strong>📰 News:</strong> "Patchday April 2026" (heute)<br><a href="https://marktplatz-it-sicherheit.de/news/patchday-april-2026" target="_blank" class="link">→ News lesen</a><br><br><strong>📄 Artikel:</strong> "Wochenrückblick IT-Sicherheit"<br><a href="https://marktplatz-it-sicherheit.de/artikel/wochenrueckblick-2026" target="_blank" class="link">→ Artikel lesen</a>`
                    };
                    addMessage(chipResponses[text], 'bot');
                }, 800);
                return;
            }

            setTimeout(() => {
                const responses = [
                    `Hier wird dann die Antwort des RAG Systems stehen zu deiner Frage: "${text}"!`,
                    `Hier wird dann die Antwort des RAG Systems stehen zu deiner Frage: "${text}"!`,
                    `Hier wird dann die Antwort des RAG Systems stehen zu deiner Frage: "${text}"!`
                ];
                addMessage(responses[Math.floor(Math.random() * responses.length)], 'bot');
            }, 800);
        }

        function addMessage(text, sender) {
            const messages = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${sender}-avatar`;
            if (sender === 'bot') {
                avatar.innerHTML = 'B';
            } else {
                avatar.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>`;
            }
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${sender}-bubble`;
            bubble.innerHTML = text;
            if (sender === 'user') {
                messageDiv.appendChild(bubble);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(bubble);
            }
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function toggleSpeechInput() {
            const micBtn = document.getElementById('micBtn');
            const micStatus = document.getElementById('micStatus');

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                micStatus.textContent = 'Spracherkennung wird in diesem Browser nicht unterstützt.';
                micStatus.classList.add('active');
                return;
            }

            if (!recognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = true;
                recognition.continuous = false;

                recognition.onstart = () => {
                    isListening = true;
                    micBtn.classList.add('listening');
                    micStatus.textContent = 'Ich höre zu...';
                    micStatus.classList.add('active');
                };

                recognition.onresult = (event) => {
                    let transcript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        transcript += event.results[i][0].transcript;
                    }
                    document.getElementById('userInput').value = transcript.trim();
                };

                recognition.onerror = (event) => {
                    micStatus.textContent = 'Fehler bei der Spracherkennung: ' + event.error;
                    micStatus.classList.add('active');
                    stopSpeechInput();
                };

                recognition.onend = () => {
                    stopSpeechInput(false);
                };
            }

            if (isListening) {
                stopSpeechInput();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    micStatus.textContent = 'Spracherkennung konnte nicht gestartet werden.';
                    micStatus.classList.add('active');
                }
            }
        }

        function stopSpeechInput(resetStatus = true) {
            isListening = false;
            const micBtn = document.getElementById('micBtn');
            const micStatus = document.getElementById('micStatus');
            micBtn.classList.remove('listening');
            if (resetStatus) {
                micStatus.textContent = '';
                micStatus.classList.remove('active');
            }
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        setInterval(() => {
            if (!chatOpen) {
                const launcher = document.getElementById('launcher');
                launcher.style.transform = 'scale(1.02)';
                setTimeout(() => { launcher.style.transform = 'scale(1)'; }, 500);
            }
        }, 4000);
    </script>
</body>
</html>
